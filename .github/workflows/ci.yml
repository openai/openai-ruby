name: CI
on:
  push:
    branches:
      - '**'
      - '!integrated/**'
      - '!stl-preview-head/**'
      - '!stl-preview-base/**'
      - '!generated'
      - '!codegen/**'
      - 'codegen/stl/**'
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'

jobs:
  build:
    timeout-minutes: 10
    name: build
    permissions:
      contents: read
      id-token: write
    runs-on: ${{ github.repository == 'stainless-sdks/openai-ruby' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: |-
      github.repository == 'stainless-sdks/openai-ruby' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.fork) &&
      (github.event_name != 'push' || github.event.head_commit.message != 'codegen metadata')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@c515ec17f69368147deb311832da000dd229d338 # v1
        with:
          bundler-cache: false
      - run: |-
          bundle install

      - name: Get GitHub OIDC Token
        if: |-
          github.repository == 'stainless-sdks/openai-ruby' &&
          !startsWith(github.ref, 'refs/heads/stl/')
        id: github-oidc
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: core.setOutput('github_token', await core.getIDToken());

      - name: Build and upload gem artifacts
        if: |-
          github.repository == 'stainless-sdks/openai-ruby' &&
          !startsWith(github.ref, 'refs/heads/stl/')
        env:
          URL: https://pkg.stainless.com/s
          AUTH: ${{ steps.github-oidc.outputs.github_token }}
          SHA: ${{ github.sha }}
          PACKAGE_NAME: openai
        run: ./scripts/utils/upload-artifact.sh
  lint:
    timeout-minutes: 10
    name: lint
    runs-on: ${{ github.repository == 'stainless-sdks/openai-ruby' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@c515ec17f69368147deb311832da000dd229d338 # v1
        with:
          bundler-cache: false
      - run: |-
          bundle install

      - name: Run lints
        run: ./scripts/lint
  test-ruby:
    timeout-minutes: 10
    name: test (ruby ${{ matrix.ruby-version }})
    runs-on: ${{ github.repository == 'stainless-sdks/openai-ruby' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.2', '3.3', '3.4', '4.0']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@c515ec17f69368147deb311832da000dd229d338 # v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: false
      - run: |-
          bundle install

      - name: Run tests
        run: ./scripts/test
  test:
    name: test
    needs: test-ruby
    if: ${{ always() && needs.test-ruby.result != 'skipped' }}
    runs-on: ${{ github.repository == 'stainless-sdks/openai-ruby' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    steps:
      - if: ${{ needs.test-ruby.result == 'failure' || needs.test-ruby.result == 'cancelled' }}
        run: exit 1
